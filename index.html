<!DOCTYPE html>
<html lang="pt-BR">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Inventário TI</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:Segoe UI,sans-serif;
    background:#eef1f5;
}

/* ==========================
   SIDEBAR
========================== */

.sidebar{
    width:220px;
    height:100vh;
    background:#18263c;
    color:#fff;
    position:fixed;
    left:0;
    top:0;
}

.logo{
    padding:25px;
    text-align:center;
    font-size:20px;
    font-weight:bold;
    border-bottom:1px solid rgba(255,255,255,.1);
}

.menu button{
    width:100%;
    padding:18px;
    background:none;
    border:none;
    color:white;
    text-align:left;
    cursor:pointer;
    font-size:15px;
    transition:.2s;
}

.menu button:hover{
    background:#22344f;
}

/* ==========================
   CONTEUDO
========================== */

.content{
    margin-left:220px;
    padding:25px;
}

/* ==========================
   DASHBOARD
========================== */

.cards{
    display:flex;
    flex-wrap:wrap;
    gap:20px;
    margin-bottom:25px;
}

.card{
    background:#fff;
    border-radius:12px;
    width:220px;
    padding:25px;
    box-shadow:0 2px 8px rgba(0,0,0,.08);
}

.card h2{
    color:#2d60e8;
    margin-bottom:10px;
}

.card span{
    color:#666;
}

/* ==========================
   TITULO
========================== */

.titulo-secao{
    font-size:24px;
    font-weight:bold;
    color:#333;
    margin-bottom:15px;
}

/* ==========================
   TOOLBAR
========================== */

.toolbar{
    display:flex;
    flex-wrap:wrap;
    gap:10px;
    margin-bottom:20px;
}

.toolbar input{
    width:350px;
    padding:12px;
    border-radius:8px;
    border:1px solid #ccc;
}

/* ==========================
   BOTÕES
========================== */

.btn{
    border:none;
    border-radius:8px;
    padding:12px 18px;
    color:white;
    cursor:pointer;
    font-weight:bold;
}

.btn-success{
    background:#16a34a;
}

.btn-primary{
    background:#2563eb;
}

.btn-danger{
    background:#dc2626;
}

.btn-info{
    background:#0891b2;
}

/* ==========================
   TABELA
========================== */

.table-container{
    background:white;
    border-radius:12px;
    overflow:hidden;
    box-shadow:0 2px 8px rgba(0,0,0,.08);
}

table{
    width:100%;
    border-collapse:collapse;
}

thead{
    background:#2d60e8;
    color:white;
}

th{
    padding:14px;
}

td{
    padding:14px;
    border-bottom:1px solid #e5e7eb;
}

tbody tr:hover{
    background:#edf4ff;
    cursor:pointer;
}

.selecionado{
    background:#dbeafe !important;
}

/* ==========================
   MODAL
========================== */

.modal{
    display:none;
    position:fixed;
    inset:0;
    background:rgba(0,0,0,.5);
    justify-content:center;
    align-items:center;
    z-index:999;
}

.modal-content{
    width:700px;
    max-width:95%;
    background:white;
    border-radius:12px;
    padding:25px;
}

.modal-header{
    font-size:20px;
    font-weight:bold;
    margin-bottom:20px;
}

.form-grid{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:15px;
}

.form-group{
    display:flex;
    flex-direction:column;
}

.form-group label{
    margin-bottom:6px;
    font-size:14px;
    color:#444;
}

.form-group input,
.form-group select,
.form-group textarea{
    padding:10px;
    border:1px solid #ccc;
    border-radius:8px;
}

.form-group textarea{
    resize:vertical;
    min-height:90px;
}

.modal-footer{
    margin-top:20px;
    display:flex;
    justify-content:flex-end;
    gap:10px;
}

/* ==========================
   RODAPÉ
========================== */

.rodape{
    margin-top:20px;
    color:#888;
}

</style>

</head>

<body>

<div class="sidebar">

    <div class="logo">
        Inventário TI
    </div>

    <div class="menu">

        <button onclick="abrirDashboard()">
            📊 Dashboard
        </button>

        <button onclick="carregarTabela('computadores')">
            🖥 Computadores
        </button>

        <button onclick="carregarTabela('celulares')">
            📱 Celulares
        </button>

        <button onclick="carregarTabela('perifericos')">
            🖨 Periféricos
        </button>

        <button onclick="carregarTabela('usuarios')">
            👥 Usuários
        </button>

    </div>

</div>

<div class="content">

    <div class="titulo-secao" id="tituloPagina">
        Dashboard
    </div>

    <!-- DASHBOARD GERAL -->

    <div class="cards" id="dashboardCards">

        <div class="card">
            <h2 id="qtdComp">0</h2>
            <span>Computadores</span>
        </div>

        <div class="card">
            <h2 id="qtdCel">0</h2>
            <span>Celulares</span>
        </div>

        <div class="card">
            <h2 id="qtdPer">0</h2>
            <span>Periféricos</span>
        </div>

        <div class="card">
            <h2 id="qtdUser">0</h2>
            <span>Usuários</span>
        </div>

        <div class="card">
            <h2 id="qtdUso">0</h2>
            <span>Em Uso</span>
        </div>

        <div class="card">
            <h2 id="qtdDisp">0</h2>
            <span>Disponíveis</span>
        </div>

        <div class="card">
            <h2 id="qtdReparo">0</h2>
            <span>Em Reparo</span>
        </div>

    </div>

    <!-- MINI DASHBOARD DA TELA -->

    <div class="cards" id="cardsSecao">

        <div class="card">
            <h2 id="secaoTotal">0</h2>
            <span>Total</span>
        </div>

        <div class="card">
            <h2 id="secaoUso">0</h2>
            <span>Em Uso</span>
        </div>

        <div class="card">
            <h2 id="secaoDisponivel">0</h2>
            <span>Disponíveis</span>
        </div>

        <div class="card">
            <h2 id="secaoReparo">0</h2>
            <span>Em Reparo</span>
        </div>

    </div>

    <!-- TOOLBAR -->

    <div class="toolbar">

        <input
            type="text"
            id="pesquisa"
            placeholder="Pesquisar patrimônio, usuário, setor ou status..."
        >

        <button class="btn btn-success" id="btnNovo">
            ➕ Novo
        </button>

        <button class="btn btn-primary" id="btnEditar">
            ✏ Editar
        </button>

        <button class="btn btn-danger" id="btnExcluir">
            🗑 Excluir
        </button>

        <button class="btn btn-info" id="btnAtualizar">
            🔄 Atualizar
        </button>

    </div>

    <!-- TABELA -->

    <div class="table-container">

        <table>

            <thead>
                <tr id="cabecalhoTabela"></tr>
            </thead>

            <tbody id="tabela"></tbody>

        </table>

    </div>

    <div class="rodape">
        Inventário TI v2.0
    </div>

</div>

<!-- MODAL -->

<div class="modal" id="modalRegistro">

    <div class="modal-content">

        <div class="modal-header" id="tituloModal">
            Novo Registro
        </div>

        <div class="form-grid" id="camposModal">

        </div>

        <div class="modal-footer">

            <button class="btn btn-danger">
                Cancelar
            </button>

            <button class="btn btn-success">
                Salvar
            </button>

        </div>

    </div>

</div>

<script>

let abaAtual = "dashboard";

let banco = {

    computadores: [],
    celulares: [],
    perifericos: [],
    usuarios: []

};

let linhaSelecionada = null;

/* ==========================
   DASHBOARD
========================== */

function abrirDashboard(){

    abaAtual = "dashboard";

    document.getElementById(
        "tituloPagina"
    ).innerText = "Dashboard";

    document.getElementById(
        "dashboardCards"
    ).style.display = "flex";

    document.getElementById(
        "cardsSecao"
    ).style.display = "none";

}

function atualizarDashboard(){

    document.getElementById("qtdComp").innerText =
        banco.computadores.length;

    document.getElementById("qtdCel").innerText =
        banco.celulares.length;

    document.getElementById("qtdPer").innerText =
        banco.perifericos.length;

    document.getElementById("qtdUser").innerText =
        banco.usuarios.length;

    let uso = 0;
    let disponivel = 0;
    let reparo = 0;

    const tudo = [
        ...banco.computadores,
        ...banco.celulares,
        ...banco.perifericos
    ];

    tudo.forEach(item => {

        const status =
            (item.status || "").toLowerCase();

        if(status === "em uso")
            uso++;

        if(status === "disponível")
            disponivel++;

        if(
            status === "em reparo" ||
            status === "em manutenção"
        )
            reparo++;
    });

    document.getElementById("qtdUso").innerText =
        uso;

    document.getElementById("qtdDisp").innerText =
        disponivel;

    document.getElementById("qtdReparo").innerText =
        reparo;

}

/* ==========================
   MINI DASHBOARD
========================== */

function atualizarMiniDashboard(tipo){

    let total = 0;
    let uso = 0;
    let disponivel = 0;
    let reparo = 0;

    const lista = banco[tipo] || [];

    total = lista.length;

    lista.forEach(item => {

        const status =
            (item.status || "").toLowerCase();

        if(status === "em uso")
            uso++;

        if(status === "disponível")
            disponivel++;

        if(
            status === "em reparo" ||
            status === "em manutenção"
        )
            reparo++;

    });

    document.getElementById(
        "secaoTotal"
    ).innerText = total;

    document.getElementById(
        "secaoUso"
    ).innerText = uso;

    document.getElementById(
        "secaoDisponivel"
    ).innerText = disponivel;

    document.getElementById(
        "secaoReparo"
    ).innerText = reparo;

}

/* ==========================
   TABELA
========================== */

function carregarTabela(tipo){

    abaAtual = tipo;

    document.getElementById(
        "tituloPagina"
    ).innerText =
        tipo.charAt(0).toUpperCase() +
        tipo.slice(1);

    document.getElementById(
        "dashboardCards"
    ).style.display = "none";

    document.getElementById(
        "cardsSecao"
    ).style.display = "flex";

    atualizarMiniDashboard(tipo);

    const tabela =
        document.getElementById("tabela");

    const cabecalho =
        document.getElementById(
            "cabecalhoTabela"
        );

    tabela.innerHTML = "";
    cabecalho.innerHTML = "";

    if(
        !banco[tipo] ||
        banco[tipo].length === 0
    ){
        return;
    }

    const colunas =
        Object.keys(banco[tipo][0]);

    colunas.forEach(col => {

        cabecalho.innerHTML +=
            `<th>${col}</th>`;

    });

    banco[tipo].forEach(item => {

        let linha = "<tr>";

        colunas.forEach(col => {

            linha +=
                `<td>${item[col] ?? ""}</td>`;

        });

        linha += "</tr>";

        tabela.innerHTML += linha;

    });

    selecionarLinhas();

}

/* ==========================
   SELEÇÃO
========================== */

function selecionarLinhas(){

    document
    .querySelectorAll("#tabela tr")
    .forEach(linha => {

        linha.addEventListener(
            "click",
            () => {

                document
                .querySelectorAll("#tabela tr")
                .forEach(l => {

                    l.classList.remove(
                        "selecionado"
                    );

                });

                linha.classList.add(
                    "selecionado"
                );

                linhaSelecionada = linha;

            }
        );

    });

}

/* ==========================
   PESQUISA
========================== */

document
.getElementById("pesquisa")
.addEventListener("keyup", function(){

    const texto =
        this.value.toLowerCase();

    document
    .querySelectorAll("#tabela tr")
    .forEach(linha => {

        linha.style.display =
            linha.innerText
            .toLowerCase()
            .includes(texto)

            ? ""

            : "none";

    });

});

/* ==========================
   MODAL
========================== */

const modal =
document.getElementById(
    "modalRegistro"
);

function abrirModal(titulo){

    document.getElementById(
        "tituloModal"
    ).innerText = titulo;

    modal.style.display =
        "flex";

}

function fecharModal(){

    modal.style.display =
        "none";

}

document
.querySelector(".btn-danger")
.addEventListener(
    "click",
    fecharModal
);

/* ==========================
   BOTÕES
========================== */

document
.getElementById("btnNovo")
.addEventListener("click",()=>{

    abrirModal(
        "Novo Registro"
    );

});

document
.getElementById("btnEditar")
.addEventListener("click",()=>{

    if(!linhaSelecionada){

        alert(
            "Selecione um registro."
        );

        return;
    }

    abrirModal(
        "Editar Registro"
    );

});

document
.getElementById("btnExcluir")
.addEventListener("click",()=>{

    if(!linhaSelecionada){

        alert(
            "Selecione um registro."
        );

        return;
    }

    const confirmar =
    confirm(
        "Deseja excluir?"
    );

    if(confirmar){

        linhaSelecionada.remove();

    }

});

/* ==========================
   INICIALIZAÇÃO
========================== */

abrirDashboard();

</script>

<script type="module">

import {
    initializeApp
}
from "https://www.gstatic.com/firebasejs/12.0.0/firebase-app.js";

import {
    getFirestore,
    collection,
    getDocs
}
from "https://www.gstatic.com/firebasejs/12.0.0/firebase-firestore.js";

/* FIREBASE */

const firebaseConfig = {

    apiKey:
    "SUA_API_KEY",

    authDomain:
    "inventario-ti-6680d.firebaseapp.com",

    projectId:
    "inventario-ti-6680d",

    storageBucket:
    "inventario-ti-6680d.firebasestorage.app",

    messagingSenderId:
    "858629077463",

    appId:
    "1:858629077463:web:dadfdd04aca733fa79f392"

};

const app =
initializeApp(firebaseConfig);

const db =
getFirestore(app);

/* COMPUTADORES */

async function
carregarComputadores(){

    const snapshot =
    await getDocs(
        collection(
            db,
            "Computadores"
        )
    );

    banco.computadores = [];

    snapshot.forEach(doc=>{

        banco.computadores.push(
            doc.data()
        );

    });

    atualizarDashboard();

}

/* CELULARES */

async function
carregarCelulares(){

    const snapshot =
    await getDocs(
        collection(
            db,
            "Celulares"
        )
    );

    banco.celulares = [];

    snapshot.forEach(doc=>{

        banco.celulares.push(
            doc.data()
        );

    });

    atualizarDashboard();

}

/* PERIFERICOS */

async function
carregarPerifericos(){

    const snapshot =
    await getDocs(
        collection(
            db,
            "perifericos"
        )
    );

    banco.perifericos = [];

    snapshot.forEach(doc=>{

        banco.perifericos.push(
            doc.data()
        );

    });

    atualizarDashboard();

}

/* USUARIOS */

async function
carregarUsuarios(){

    const snapshot =
    await getDocs(
        collection(
            db,
            "usuarios"
        )
    );

    banco.usuarios = [];

    snapshot.forEach(doc=>{

        banco.usuarios.push(
            doc.data()
        );

    });

    atualizarDashboard();

}

/* INÍCIO */

await carregarComputadores();
await carregarCelulares();
await carregarPerifericos();
await carregarUsuarios();

</script>

</body>
</html>
