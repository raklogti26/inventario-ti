<!DOCTYPE html>
<html lang="pt-BR">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Inventário TI V3</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:"Segoe UI",sans-serif;
    background:#eef1f5;
}

/* ============================= */
/* SIDEBAR */
/* ============================= */

.sidebar{
    width:220px;
    height:100vh;
    background:#18263c;
    position:fixed;
    left:0;
    top:0;
    color:white;
}

.logo{
    padding:25px;
    text-align:center;
    font-size:20px;
    font-weight:bold;
    border-bottom:1px solid rgba(255,255,255,.1);
}

.menu button{
    width:100%;
    border:none;
    background:none;
    color:white;
    text-align:left;
    padding:18px;
    cursor:pointer;
    font-size:15px;
}

.menu button:hover{
    background:#22344f;
}

/* ============================= */
/* CONTEÚDO */
/* ============================= */

.content{
    margin-left:220px;
    padding:25px;
}

.titulo-secao{
    font-size:24px;
    font-weight:bold;
    color:#333;
    margin-bottom:20px;
}

/* ============================= */
/* DASHBOARD */
/* ============================= */

.cards{
    display:flex;
    flex-wrap:wrap;
    gap:20px;
    margin-bottom:25px;
}

.card{
    width:220px;
    background:white;
    border-radius:12px;
    padding:25px;
    box-shadow:0 2px 8px rgba(0,0,0,.08);
}

.card h2{
    color:#2d60e8;
    margin-bottom:10px;
}

.card span{
    color:#555;
}

/* ============================= */
/* TOOLBAR */
/* ============================= */

.toolbar{
    display:flex;
    gap:10px;
    flex-wrap:wrap;
    margin-bottom:20px;
}

.toolbar input{
    width:350px;
    padding:12px;
    border-radius:8px;
    border:1px solid #ccc;
}

.btn{
    border:none;
    border-radius:8px;
    cursor:pointer;
    padding:12px 18px;
    color:white;
    font-weight:bold;
}

.btn-success{
    background:#16a34a;
}

.btn-primary{
    background:#2563eb;
}

.btn-danger{
    background:#dc2626;
}

.btn-info{
    background:#0891b2;
}

.btn-warning{
    background:#d97706;
}

/* ============================= */
/* PAINEL FILTROS */
/* ============================= */

#painelFiltros{

    display:none;

    background:white;

    padding:20px;

    border-radius:12px;

    margin-bottom:20px;

    box-shadow:0 2px 8px rgba(0,0,0,.08);

}

#painelFiltros h3{

    margin-bottom:15px;

}

#painelFiltros label{

    display:block;

    margin-bottom:10px;

}

/* ============================= */
/* TABELA */
/* ============================= */

.table-container{

    background:white;

    border-radius:12px;

    overflow:hidden;

    box-shadow:0 2px 8px rgba(0,0,0,.08);

}

table{

    width:100%;

    border-collapse:collapse;

}

thead{

    background:#2d60e8;

    color:white;

}

th{

    padding:14px;

}

td{

    padding:14px;

    border-bottom:1px solid #e5e7eb;

}

tbody tr{

    cursor:pointer;

}

tbody tr:hover{

    background:#edf4ff;

}

.selecionado{

    background:#dbeafe !important;

}

/* ============================= */
/* MODAL */
/* ============================= */

.modal{

    display:none;

    position:fixed;

    top:0;

    left:0;

    width:100%;

    height:100%;

    background:rgba(0,0,0,.5);

    justify-content:center;

    align-items:center;

    z-index:9999;

}

.modal-content{

    width:750px;

    max-width:95%;

    background:white;

    border-radius:12px;

    padding:25px;

}

.modal-header{

    font-size:20px;

    font-weight:bold;

    margin-bottom:20px;

}

.form-grid{

    display:grid;

    grid-template-columns:1fr 1fr;

    gap:15px;

}

.form-group{

    display:flex;

    flex-direction:column;

}

.form-group label{

    margin-bottom:6px;

}

.form-group input,
.form-group select,
.form-group textarea{

    padding:10px;

    border:1px solid #ccc;

    border-radius:8px;

}

.form-group textarea{

    min-height:100px;

    resize:vertical;

}

.modal-footer{

    margin-top:20px;

    display:flex;

    justify-content:flex-end;

    gap:10px;

}

/* ============================= */
/* RODAPÉ */
/* ============================= */

.rodape{

    margin-top:20px;

    color:#888;

}

</style>

</head>

<body>

<!-- SIDEBAR -->

<div class="sidebar">

    <div class="logo">
        Inventário TI
    </div>

    <div class="menu">

        <button onclick="abrirDashboard()">
            📊 Dashboard
        </button>

        <button onclick="carregarTabela('computadores')">
            🖥 Computadores
        </button>

        <button onclick="carregarTabela('celulares')">
            📱 Celulares
        </button>

        <button onclick="carregarTabela('perifericos')">
            🖨 Periféricos
        </button>

        <button onclick="carregarTabela('usuarios')">
            👥 Usuários
        </button>

    </div>

</div>

<!-- CONTEÚDO -->

<div class="content">

    <div class="titulo-secao" id="tituloPagina">

        Dashboard

    </div>

    <!-- DASHBOARD GERAL -->

    <div class="cards" id="dashboardCards">

        <div class="card">
            <h2 id="qtdComp">0</h2>
            <span>Computadores</span>
        </div>

        <div class="card">
            <h2 id="qtdCel">0</h2>
            <span>Celulares</span>
        </div>

        <div class="card">
            <h2 id="qtdPer">0</h2>
            <span>Periféricos</span>
        </div>

        <div class="card">
            <h2 id="qtdUser">0</h2>
            <span>Usuários</span>
        </div>

        <div class="card">
            <h2 id="qtdUso">0</h2>
            <span>Em Uso</span>
        </div>

        <div class="card">
            <h2 id="qtdDisp">0</h2>
            <span>Disponíveis</span>
        </div>

        <div class="card">
            <h2 id="qtdReparo">0</h2>
            <span>Em Reparo</span>
        </div>

    </div>

    <!-- MINI DASHBOARD -->

    <div class="cards" id="cardsSecao">

        <div class="card">
            <h2 id="secaoTotal">0</h2>
            <span>Total</span>
        </div>

        <div class="card">
            <h2 id="secaoUso">0</h2>
            <span>Em Uso</span>
        </div>

        <div class="card">
            <h2 id="secaoDisponivel">0</h2>
            <span>Disponíveis</span>
        </div>

        <div class="card">
            <h2 id="secaoReparo">0</h2>
            <span>Em Reparo</span>
        </div>

    </div>

    <!-- TOOLBAR -->

    <div class="toolbar">

        <input
            type="text"
            id="pesquisa"
            placeholder="Pesquisar patrimônio, usuário, setor ou status..."
        >

        <button class="btn btn-warning"
                id="btnFiltro">

            🔎 Filtros

        </button>

        <button class="btn btn-success"
                id="btnNovo">

            ➕ Novo

        </button>

        <button class="btn btn-primary"
                id="btnEditar">

            ✏ Editar

        </button>

        <button class="btn btn-danger"
                id="btnExcluir">

            🗑 Excluir

        </button>

        <button class="btn btn-info"
                id="btnAtualizar">

            🔄 Atualizar

        </button>

    </div>

    <!-- FILTROS -->

    <div id="painelFiltros">

        <h3>Filtros</h3>

        <label>
            <input type="checkbox" checked>
            Computadores
        </label>

        <label>
            <input type="checkbox" checked>
            Celulares
        </label>

        <label>
            <input type="checkbox" checked>
            Periféricos
        </label>

        <label>
            <input type="checkbox" checked>
            Usuários
        </label>

    </div>

    <!-- TABELA -->

    <div class="table-container">

        <table>

            <thead>

                <tr id="cabecalhoTabela"></tr>

            </thead>

            <tbody id="tabela"></tbody>

        </table>

    </div>

    <div class="rodape">

        Inventário TI V3

    </div>

</div>

<!-- MODAL -->

<div id="modalRegistro" class="modal">

    <div class="modal-content">

        <div class="modal-header"
             id="tituloModal">

            Novo Registro

        </div>

        <div id="camposModal"
             class="form-grid">

        </div>

        <div class="modal-footer">

            <button
                id="btnCancelarModal"
                class="btn btn-danger">

                Cancelar

            </button>

            <button
                id="btnSalvarModal"
                class="btn btn-success">

                Salvar

            </button>

        </div>

    </div>

</div>


<!-- NOVO MODAL DETALHES -->

<div id="modalDetalhes" class="modal">

    <div class="modal-content">

        <div class="modal-header">

            Detalhes do Computador

        </div>

        <div id="conteudoDetalhes"></div>

        <div class="modal-footer">

            <button
                class="btn btn-primary"
                onclick="fecharDetalhes()">

                Fechar

            </button>

        </div>

    </div>

</div>



    
    <script>

let abaAtual = "dashboard";

let banco = {

    computadores:[],
    celulares:[],
    perifericos:[],
    usuarios:[]

};

let linhaSelecionada = null;

/* ==================================
   DASHBOARD
================================== */

function abrirDashboard(){

    abaAtual = "dashboard";

    document.getElementById(
        "tituloPagina"
    ).innerText = "Dashboard";

    document.getElementById(
        "dashboardCards"
    ).style.display = "flex";

    document.getElementById(
        "cardsSecao"
    ).style.display = "none";

    document.getElementById(
        "btnNovo"
    ).style.display = "none";

    document.getElementById(
        "btnEditar"
    ).style.display = "none";

    document.getElementById(
        "btnExcluir"
    ).style.display = "none";

    document.getElementById(
        "btnFiltro"
    ).style.display = "";

    limparTabela();

}

/* ==================================
   TABELAS
================================== */

function carregarTabela(tipo){

    abaAtual = tipo;

    document.getElementById(
        "tituloPagina"
    ).innerText =
    tipo.charAt(0).toUpperCase() +
    tipo.slice(1);

    document.getElementById(
        "dashboardCards"
    ).style.display = "none";

    document.getElementById(
        "cardsSecao"
    ).style.display = "flex";

    document.getElementById(
        "btnNovo"
    ).style.display = "";

    document.getElementById(
        "btnEditar"
    ).style.display = "";

    document.getElementById(
        "btnExcluir"
    ).style.display = "";

    document.getElementById(
        "btnFiltro"
    ).style.display = "none";

    atualizarMiniDashboard(tipo);

    const tabela =
        document.getElementById("tabela");

    const cabecalho =
        document.getElementById(
            "cabecalhoTabela"
        );

    tabela.innerHTML = "";
    cabecalho.innerHTML = "";

    if(
        !banco[tipo] ||
        banco[tipo].length === 0
    ){
        return;
    }

    const colunas = [
   
    "patrimonio",
    "usuario",
    "setor",
    "modelo",
    "status"

    ];


    colunas.forEach(col=>{

       cabecalho.innerHTML +=
       `<th>${col}</th>`;

    });

    cabecalho.innerHTML +=
    `<th>Detalhes</th>`;

   

    banco[tipo].forEach(item=>{

        let linha = "<tr>";

        colunas.forEach(col=>{

            linha +=
            `<td>${item[col] ?? ""}</td>`;

        });

        linha += `
               <td>
                 <button
                 class="btn btn-info"
                 onclick='mostrarDetalhes(${JSON.stringify(item)})'>
                 🔍
               </button>
        </td>
        `;
        
        linha += "</tr>";

        tabela.innerHTML += linha;

    });

    selecionarLinhas();

}

/* ==================================
   DASHBOARD GERAL
================================== */

function atualizarDashboard(){

    document.getElementById(
        "qtdComp"
    ).innerText =
    banco.computadores.length;

    document.getElementById(
        "qtdCel"
    ).innerText =
    banco.celulares.length;

    document.getElementById(
        "qtdPer"
    ).innerText =
    banco.perifericos.length;

    document.getElementById(
        "qtdUser"
    ).innerText =
    banco.usuarios.length;

    let uso = 0;
    let disp = 0;
    let reparo = 0;

    const ativos = [

        ...banco.computadores,
        ...banco.celulares,
        ...banco.perifericos

    ];

    ativos.forEach(item=>{

        const status =
        (item.status || "")
        .toLowerCase();

        if(status === "em uso")
            uso++;

        if(status === "disponível")
            disp++;

        if(
            status === "em reparo" ||
            status === "em manutenção"
        )
            reparo++;

    });

    document.getElementById(
        "qtdUso"
    ).innerText = uso;

    document.getElementById(
        "qtdDisp"
    ).innerText = disp;

    document.getElementById(
        "qtdReparo"
    ).innerText = reparo;

}

/* ==================================
   MINI DASHBOARD
================================== */

function atualizarMiniDashboard(tipo){

    if(
        !banco[tipo]
    ){
        return;
    }

    const lista =
        banco[tipo];

    let uso = 0;
    let disp = 0;
    let reparo = 0;

    lista.forEach(item=>{

        const status =
        (item.status || "")
        .toLowerCase();

        if(status === "em uso")
            uso++;

        if(status === "disponível")
            disp++;

        if(
            status === "em reparo" ||
            status === "em manutenção"
        )
            reparo++;

    });

    document.getElementById(
        "secaoTotal"
    ).innerText =
    lista.length;

    document.getElementById(
        "secaoUso"
    ).innerText =
    uso;

    document.getElementById(
        "secaoDisponivel"
    ).innerText =
    disp;

    document.getElementById(
        "secaoReparo"
    ).innerText =
    reparo;

}

/* ==================================
   LIMPA TABELA
================================== */

function limparTabela(){

    document.getElementById(
        "tabela"
    ).innerHTML = "";

    document.getElementById(
        "cabecalhoTabela"
    ).innerHTML = "";

}

/* ==================================
   SELEÇÃO
================================== */

function selecionarLinhas(){

    document
    .querySelectorAll(
        "#tabela tr"
    )
    .forEach(linha=>{

        linha.addEventListener(
            "click",
            ()=>{

                document
                .querySelectorAll(
                    "#tabela tr"
                )
                .forEach(l=>{

                    l.classList.remove(
                        "selecionado"
                    );

                });

                linha.classList.add(
                    "selecionado"
                );

                linhaSelecionada =
                    linha;

            }
        );

    });

}

/* ==================================
   PESQUISA
================================== */

document
.getElementById(
    "pesquisa"
)
.addEventListener(
    "keyup",
    function(){

        const texto =
        this.value
        .toLowerCase();

        document
        .querySelectorAll(
            "#tabela tr"
        )
        .forEach(linha=>{

            linha.style.display =

            linha.innerText
            .toLowerCase()
            .includes(texto)

            ? ""

            : "none";

        });

    }
);

/* ==================================
   FILTROS
================================== */

document
.getElementById(
    "btnFiltro"
)
.addEventListener(
    "click",
    ()=>{

        const painel =
        document.getElementById(
            "painelFiltros"
        );

        painel.style.display =

        painel.style.display ===
        "block"

        ? "none"

        : "block";

    }
);

/* ==================================
   MODAL
================================== */

const modal =
document.getElementById(
    "modalRegistro"
);

function abrirModal(titulo){

    
document.getElementById(
        "tituloModal"
    ).innerText = titulo;

    const campos =
    document.getElementById(
        "camposModal"
    );

    campos.innerHTML = "";

    if(abaAtual === "computadores"){

   
campos.innerHTML = `

        <div class="form-group">
            <label>Patrimônio</label>
            <input type="text" id="patrimonio">
        </div>

        <div class="form-group">
            <label>Domínio</label>
            <input type="text" id="dominio">
        </div>

        <div class="form-group">
            <label>Usuário</label>
            <input type="text" id="usuario">
        </div>

        <div class="form-group">
            <label>Setor</label>
            <input type="text" id="setor">
        </div>

        <div class="form-group">
            <label>Serial</label>
            <input type="text" id="serial">
        </div>

        <div class="form-group">
            <label>Status</label>

            <select id="status">

                <option>Em Uso</option>

                <option>Disponível</option>

                <option>Em Reparo</option>

            </select>

        </div>

        <div class="form-group">
            <label>Tipo</label>
            <input type="text" id="tipo">
        </div>

        <div class="form-group">
            <label>Marca</label>
            <input type="text" id="marca">
        </div>

        <div class="form-group">
            <label>Modelo</label>
            <input type="text" id="modelo">
        </div>

        <div class="form-group">
            <label>CPU</label>
            <input type="text" id="cpu">
        </div>

        <div class="form-group">
            <label>RAM</label>
            <input type="text" id="ram">
        </div>

        <div class="form-group">
            <label>Armazenamento</label>
            <input type="text" id="armazenamento">
        </div>

        <div class="form-group">
            <label>GPU</label>
            <input type="text" id="gpu">
        </div>

        <div class="form-group">
            <label>Sistema / Licença</label>
            <input type="text" id="sistema">
        </div>

        <div class="form-group">
            <label>Usuário Anterior</label>
            <input type="text" id="usuarioAnterior">
        </div>

        <div class="form-group">
            <label>Observação</label>

            <textarea
            id="observacao"></textarea>
        </div>

    `;

}


    modal.style.display = "flex";

}


function fecharModal(){

    modal.style.display =
    "none";

}

        
function fecharDetalhes(){

    document.getElementById(
        "modalDetalhes"
    ).style.display = "none";

}


function mostrarDetalhes(item){

    const ordemCampos = [

        "patrimonio",
        "dominio",
        "usuario",
        "setor",

        "serial",
        "status",

        "tipo",
        "marca",
        "modelo",

        "cpu",
        "ram",
        "gpu",
        "armazenamento",

        "sistema",

        "usuarioAnterior",

        "observacao"

    ];

    const nomesCampos = {

        patrimonio: "Patrimônio",
        dominio: "Domínio",
        usuario: "Usuário",
        setor: "Setor",

        serial: "Serial",
        status: "Status",

        tipo: "Tipo",
        marca: "Marca",
        modelo: "Modelo",

        cpu: "CPU",
        ram: "RAM",
        gpu: "GPU",
        armazenamento: "Armazenamento",

        sistema: "Sistema",

        usuarioAnterior: "Usuário Anterior",

        observacao: "Observação"

    };

    let detalhes = "";

    ordemCampos.forEach(campo=>{

        if(
            item[campo] === "" ||
            item[campo] === null ||
            item[campo] === undefined
        ){
            return;
        }

        detalhes +=
        `${nomesCampos[campo]}: ${item[campo]}\n`;

    });

    
document.getElementById(
    "conteudoDetalhes"
).innerHTML =

`<pre>${detalhes}</pre>`;

document.getElementById(
    "modalDetalhes"
).style.display = "flex";


}

        
document
.getElementById(
    "btnCancelarModal"
)
.addEventListener(
    "click",
    fecharModal
);

/* ==================================
   CRUD VISUAL
================================== */

document
.getElementById(
    "btnNovo"
)
.addEventListener(
    "click",
    ()=>{

        abrirModal(
            "Novo Registro"
        );

    }
);

document
.getElementById(
    "btnEditar"
)
.addEventListener(
    "click",
    ()=>{

        if(!linhaSelecionada){

            alert(
                "Selecione um registro."
            );

            return;

        }

        abrirModal(
            "Editar Registro"
        );

    }
);

document
.getElementById(
    "btnExcluir"
)
.addEventListener(
    "click",
    ()=>{

        if(!linhaSelecionada){

            alert(
                "Selecione um registro."
            );

            return;

        }

        const confirmar =
        confirm(
            "Deseja excluir o registro?"
        );

        if(confirmar){

            linhaSelecionada.remove();

            linhaSelecionada = null;

        }

    }
);

/* ==================================

================================== */

async function carregarComputadores(){

    try{

        const snapshot =
        await getDocs(
            collection(
                db,
                "Computadores"
            )
        );

        banco.computadores = [];

        snapshot.forEach(doc=>{

            banco.computadores.push({

                id: doc.id,

                ...doc.data()

            });

        });

        console.log(
            "Computadores:",
            banco.computadores.length
        );

    }
    catch(erro){

        console.error(
            "Erro Computadores:",
            erro
        );

    }

}
